#goal build the ci for this application
name: CI
on:
    push: 
        branches: [master]
jobs:
    frontend:
        runs-on: ubuntu-latest
        steps:
            - name: checkout code
              uses: actions/checkout@v2

            - name: setup node
              uses: actions/setup-node@v6

              with:
                node-version: 20
                cache: npm
                cache-dependency-path: frontend/package-lock.json
            - name: install packages
              run: npm install
              working-directory: frontend
             
            - name: run linting
              run: npm run lint
             
            - name: run tests
              run: npm run test
