name: CD
on: 
    workflow_call: 

jobs:
    deploy:
        runs-on: self-hosted
        steps: 
            - name: checkout code
              uses: actions/checkout@v7
            - name: copying env file
              run: cp .env.example .env
              
            - name: docker login
              uses: docker/login-action@v2
              with:
                username: ${{ vars.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}
                
            - name: deploy
              run: |
                docker compose pull
                docker compose up -d


                